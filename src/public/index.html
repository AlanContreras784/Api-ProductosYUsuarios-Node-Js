<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CRUD Productos</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body class="bg-light">

  <div class="container mt-5">

    <!-- TITULO -->
    <h1 class="text-center mb-4">
      CRUD de Productos
    </h1>
    <!-- USUARIO LOGUEADO -->
    <div
      id="userPanel"
      class="d-flex justify-content-end mb-3"
    >
    </div>
    <!-- FORMULARIO -->
    <div class="card shadow p-4 mb-5">

      <form id="form">

        <div class="mb-3">
          <label class="form-label">
            Nombre del producto
          </label>

          <input
            type="text"
            id="name"
            class="form-control"
            placeholder="Ingrese nombre"
            required
          >
        </div>

        <div class="mb-3">
          <label class="form-label">
            Precio
          </label>

          <input
            type="number"
            id="price"
            class="form-control"
            placeholder="Ingrese precio"
            required
          >
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100"
        >
          Guardar Producto
        </button>

      </form>

    </div>

    <!-- PRODUCTOS -->
    <div id="products" class="row g-4">

    </div>

  </div>

  <!-- MODAL LOGIN -->
<div
  class="modal fade"
  id="loginModal"
  tabindex="-1"
  aria-hidden="true"
>
  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">
          Iniciar Sesión
        </h5>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>
      </div>

      <div class="modal-body">

        <form id="loginForm">

          <div class="mb-3">
            <label class="form-label">
              Email
            </label>

            <input
              type="email"
              id="email"
              class="form-control"
              required
            >
          </div>

          <div class="mb-3">
            <label class="form-label">
              Contraseña
            </label>

            <input
              type="password"
              id="password"
              class="form-control"
              required
            >
          </div>

          <button
            type="submit"
            class="btn btn-primary w-100"
          >
            Ingresar
          </button>

        </form>

      </div>

    </div>

  </div>
</div>

<!-- TOAST -->
<div class="position-fixed top-0 end-0 p-3" style="z-index: 11">

  <div
    id="liveToast"
    class="toast align-items-center text-bg-dark border-0"
    role="alert"
  >

    <div class="d-flex">

      <div
        class="toast-body"
        id="toastMessage"
      >
        Mensaje
      </div>

      <button
        type="button"
        class="btn-close btn-close-white me-2 m-auto"
        data-bs-dismiss="toast"
      ></button>

    </div>

  </div>

</div>

  <!-- JS -->
  <script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
  </script>
  <script defer src="app.js"></script>
</body>
</html>
